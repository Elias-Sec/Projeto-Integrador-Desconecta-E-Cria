  <!Formulário de Assinatura>
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
      <h4 class="text-center mb-3">Entrar</h4>
      <p class="text-center text-muted">Acesse sua conta!</p>
      
      <form>
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com">
        </div>
        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senha" placeholder="••••••••">
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="lembrar">
            <label class="form-check-label" for="lembrar">Lembrar-me</label>
          </div>
          <a href="#" class="text-warning text-decoration-none">Esqueceu a senha?</a>
        </div>
        <button type="submit"class="btn fw-bold py-3 rounded-3 w-100 text-white btn-premium">Entrar</button>
      </form>

      
    </div>
