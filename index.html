<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Off-Box</title>
</head>

<body>
    <div class="container-fluid">
        <header class="row">
            <div class="col-12">
                <nav class="navbar navbar-expand-lg">
                    <div class="container-fluid">
                        <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                            <img src="img/logo-1.png" alt="Logo" class="logo" style="height: 60px;"> Off-Box
                        </a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup"
                            aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                            <div class="navbar-nav ms-auto">
                                <a class="nav-link active fw-bold px-2" aria-current="page" href="#">Inicio</a>
                                <a class="nav-link fw-bold px-2" href="#">Brincadeiras</a>
                                <a class="nav-link fw-bold px-2" href="#">Planos</a>
                                <a class="nav-link fw-bold px-2" href="#">Entrar</a>
                                <button type="button" class="btn botaonav fw-bold px-3">Assine Agora</button>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </header>
        <main>
            <!-- Bloco 1 -->
            <section class="container-fluid my-2 py-5 bloco-1">
                <div class="row align-items-center gy-4">
                    <div class="col-12 col-md-6">
                        <span class="badge rounded-pill px-3 py-2 mb-3"
                            style="background-color: #fee4cd; color: #E2694C; font-size: 0.9rem;">
                            Reduza o tempo de tela
                        </span>
                        <h1 class="display-4 fw-bold text-dark mb-3">
                            Menos telas,<br>
                            <span style="color: #F37D60;">Mais infância.</span>
                        </h1>
                        <p class="text-secondary mb-4 fs-5" style="max-width: 480px;">
                            Descubra brincadeiras offline criativas e divertidas, para que suas crianças se desenvolvam
                            de forma saudável e conectada com a família.
                        </p>
                        <div class="d-flex gap-3 flex-wrap">
                            <a href="#" class="btn btn-lg text-white fw-bold px-4 py-3"
                                style="background-color: #F37D60; border-radius: 12px;">
                                Ver Brincadeiras &rarr;
                            </a>
                            <a href="#" class="btn btn-lg btn-light fw-bold px-4 py-3 border shadow-sm"
                                style="border-radius: 12px; background-color: #ffffff; color: #000;">
                                Conheça os Planos
                            </a>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 text-center">
                        <img src="img/ilustrativa.png" alt="Criança fazendo pintura artística"
                            class="img-fluid rounded-5 border border-5 border-light shadow-sm">
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
